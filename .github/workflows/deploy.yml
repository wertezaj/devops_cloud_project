name: Deploy to AWS

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: eu-central-1 

    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    - name: build and push to ecr
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        ECR_REPOSITORY: devopsapp
        IMAGE_TAG: latest
      run: |
        docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push

    env:
      # <--- WPISZ TUTAJ SWÓJ NUMER KONTA AWS I REGION (dokładnie tak jak masz w konsoli ECR)
      ECR_REGISTRY: "426771917511.dkr.ecr.eu-central-1.amazonaws.com"
      ECR_REPOSITORY: "devopsapp"

    steps:
    - name: Deploy to EC2 via SSH
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ubuntu
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          # 1. Logowanie do ECR na maszynie EC2 przy użyciu zainstalowanego awscli
          export AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }}
          export AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws ecr get-login-password --region eu-central-1 | docker login --username AWS --password-stdin ${{ env.ECR_REGISTRY }}
          
          # 2. Pobranie obrazu przy użyciu pełnego, sztywnego adresu URL
          docker pull ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:latest
          
          # 3. Zatrzymanie starego kontenera (błędy 'No such container' są normalne i ignorowane przez || true)
          docker stop my-running-app || true
          docker rm my-running-app || true
          
          # 4. Uruchomienie nowej wersji na porcie 80 serwera
          docker run -d --name my-running-app -p 80:5000 ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:latest